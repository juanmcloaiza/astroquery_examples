name: Test notebooks

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: "0 0 * * *"

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}

    steps:
      - uses: actions/checkout@v5

      - id: find
        shell: bash
        run: |
          python <<'EOF'
          import json
          from pathlib import Path

          skip = {
              "01_authentication.ipynb",
          }

          notebooks = []
          for p in sorted(Path(".").rglob("*.ipynb")):
              if p.name in skip:
                  continue

              notebooks.append({
                  "notebook": str(p),
                  "workdir": str(p.parent),
              })

          with open("matrix.json", "w") as f:
              json.dump({"notebook": notebooks}, f)
          EOF

          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt
      - run: pip install pytest nbmake

      - name: Create root data directory
        run: mkdir -p data

      - name: Create notebook data directory
        run: mkdir -p "${{ matrix.notebook.workdir }}/data"

      - name: Execute ${{ matrix.notebook.notebook }}
        run: |
          # Retry five times for flaky connections
          for i in 1 2 3 4 5; do
            pytest --nbmake --nbmake-timeout=900 "${{ matrix.notebook.notebook }}" && exit 0
            sleep 20
          done
          exit 1
